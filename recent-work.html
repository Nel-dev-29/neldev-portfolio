<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Work - Junel</title>
    <style>
        /* [Copy the same Navigation CSS] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; line-height: 1.6; }
        nav { background-color: #000; padding: 1.5rem 0; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: 700; color: #4ade80; font-size: 1.5rem; text-decoration: none; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; transition: 0.3s; }
        .nav-links a.active { color: #4ade80; }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .hamburger span { width: 28px; height: 3px; background-color: #fff; }

        .work-section { padding: 4rem 2rem; max-width: 900px; margin: 0 auto; text-align: center; }
        .project-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; text-align: left; transition: 0.3s; }
        .project-image { width: 100%; height: 350px; background: #111; display: flex; align-items: center; justify-content: center; }
        .project-info { padding: 2.5rem; }
        .visit-btn { background: #4ade80; color: #000; padding: 0.8rem 2rem; border-radius: 10px; text-decoration: none; font-weight: 700; display: inline-block; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links { position: fixed; left: -100%; top: 75px; flex-direction: column; background: #000; width: 100%; text-align: center; transition: 0.4s; padding: 2rem 0; }
            .nav-links.active { left: 0; }
            .project-image { height: 200px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo-text">JUNEL.</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="case-studies.html">Case Studies</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="recent-work.html" class="active">Recent Work</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="work-section">
        <h2 style="margin-bottom: 2rem;">Featured Project</h2>
        <div class="project-card">
            <div class="project-image"><img src="kamatage-preview.jpg" alt="Work" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/800x400/111/4ade80?text=Kamatage+Site'"></div>
            <div class="project-info">
                <span style="color:#4ade80; font-size:0.8rem; font-weight:700;">ACCESSIBILITY • WEB DEV</span>
                <h3 style="margin: 0.5rem 0 1.5rem;">Kamatage Hearing Aid</h3>
                <p style="color:#aaa; margin-bottom: 2rem;">A specialized platform for hearing solutions, focusing on high accessibility standards and modern UI.</p>
                <a href="#" class="visit-btn">Launch Live Site</a>
            </div>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.onclick = () => navLinks.classList.toggle('active');
    </script>
</body>
</html>
