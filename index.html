<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junel - Web Developer Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        hr.section-separator {
            border: none;
            height: 1px;
            background-color: #1a1a1a;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: #000;
            padding: 1.5rem 0;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #4ade80;
        }

        /* Hero Section */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            min-height: calc(100vh - 100px);
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 2rem;
            line-height: 1.8;
            max-width: 90%;
        }

        .cta-button {
            display: inline-block;
            background-color: #4ade80;
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            background-color: #22c55e;
            transform: translateY(-2px);
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid #333;
            overflow: hidden;
            object-fit: cover;
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        /* Worked With Section */
        .worked-with {
            background-color: #0a0a0a;
            padding: 3rem 2rem;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
        }

        .worked-with-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .worked-with h2 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #999;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .logos-container {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        /* Footer */
        footer {
            background-color: #000;
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 2rem 1rem;
                min-height: auto;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .hero-content p {
                max-width: 100%;
            }

            .nav-container {
                gap: 1.5rem;
                font-size: 0.9rem;
            }

            nav a {
                font-size: 0.95rem;
            }

            .profile-circle {
                width: 200px;
                height: 200px;
            }

            .logos-container {
                gap: 1.5rem;
            }

            .logo {
                width: 45px;
                height: 45px;
            }

            .worked-with h2 {
                font-size: 1rem;
            }
        }

        /* extra small screens */
        @media (max-width: 480px) {
            nav .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            nav a {
                font-size: 0.9rem;
            }

            .hero-content h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="case-studies.html">Case Studies</a>
            <a href="testimonials.html">Testimonials</a>
            <a href="recent-work.html">Recent Work</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <hr class="section-separator">

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Hi, I'am Junel<br>Web Developer</h1>
            <p>I build modern web applications using React and Laravel. I focus on clean design, scalable architecture, and creating systems that solve real-world problems.</p>
            <button class="cta-button" onclick="window.location.href='contact.html'">Let's get started ></button>
        </div>
        <div class="hero-image">
            <div class="profile-circle">
                <img src="junel.jpg" alt="Junel Profile">
            </div>
        </div>
    </section>

    <!-- Worked With Section -->
    <div class="worked-with">
        <div class="worked-with-container">
            <h2>Worked With</h2>
            <div class="logos-container">
                <img class="logo" src="React.png" alt="React">
                <img class="logo" src="Laravel.png" alt="Laravel">
                <img class="logo" src="Canva.png" alt="Canva">
                <img class="logo" src="Figma.png" alt="Figma">
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Junel. All rights reserved.</p>
    </footer>


</body>
</html>
