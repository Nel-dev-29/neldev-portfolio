<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junel - Web Developer Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; line-height: 1.6; }

        /* Shared Navigation */
        nav { background-color: #000; padding: 1.5rem 0; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: 700; color: #4ade80; font-size: 1.5rem; text-decoration: none; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 1rem; }
        .nav-links a:hover, .nav-links a.active { color: #4ade80; }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .hamburger span { width: 28px; height: 3px; background-color: #fff; border-radius: 2px; }

        /* Hero */
        .hero { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; min-height: 80vh; }
        .hero-content h1 { font-size: 3.5rem; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero-content p { color: #ccc; margin-bottom: 2rem; font-size: 1.1rem; }
        .cta-button { background-color: #4ade80; color: #000; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 700; display: inline-block; }
        .profile-circle { width: 300px; height: 300px; border-radius: 50%; border: 2px solid #333; overflow: hidden; margin: 0 auto; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links { position: fixed; left: -100%; top: 75px; flex-direction: column; background: #000; width: 100%; text-align: center; transition: 0.4s; padding: 2rem 0; border-bottom: 1px solid #1a1a1a; }
            .nav-links.active { left: 0; }
            .hero { grid-template-columns: 1fr; text-align: center; padding: 2rem 1rem; }
            .hero-content h1 { font-size: 2.5rem; }
            .profile-circle { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo-text">JUNEL.</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="case-studies.html">Case Studies</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="recent-work.html">Recent Work</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Hi, I'm Junel<br><span style="color:#4ade80">Web Developer</span></h1>
            <p>I build modern web applications using React and Laravel. I focus on clean design, scalable architecture, and systems that solve real-world problems.</p>
            <a href="contact.html" class="cta-button">Let's get started ></a>
        </div>
        <div class="hero-image">
            <div class="profile-circle"><img src="junel.jpg" alt="Profile"></div>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.onclick = () => navLinks.classList.toggle('active');
    </script>
</body>
</html>
