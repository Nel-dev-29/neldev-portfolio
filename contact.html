<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Junel's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: #000;
            padding: 1.5rem 0;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: #4ade80;
        }

        /* Contact Section */
        .contact {
            padding: 6rem 2rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .contact p {
            color: #888;
            margin-bottom: 3rem;
        }

        /* Contact Items Grid */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none; /* In case you want to make them links later */
        }

        .contact-item:hover {
            border-color: #4ade80;
            transform: translateY(-5px);
            background: #111;
        }

        .contact-item img {
            width: 45px;
            height: 45px;
            margin-bottom: 1.2rem;
            object-fit: contain;
        }

        .contact-item .label {
            font-size: 0.8rem;
            color: #4ade80;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .contact-item .value {
            font-size: 1rem;
            color: #fff;
            word-break: break-all;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            padding: 2rem;
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid #1a1a1a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container { gap: 1.5rem; }
            .contact h2 { font-size: 2.5rem; }
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="case-studies.html">Case Studies</a>
            <a href="testimonials.html">Testimonials</a>
            <a href="recent-work.html">Recent Work</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="contact">
        <h2>Get in Touch</h2>
        <p>Feel free to reach out for collaborations or just a friendly hello.</p>
        
        <div class="contact-grid">
            <div class="contact-item">
                <img src="facebook.png" alt="Facebook">
                <span class="label">Facebook</span>
                <span class="value">Junel Micabalo</span>
            </div>

            <div class="contact-item">
                <img src="gmail.png" alt="Gmail">
                <span class="label">Email</span>
                <span class="value">junelmicabalo19@gmail.com</span>
            </div>

            <div class="contact-item">
                <img src="instagram.png" alt="Instagram">
                <span class="label">Instagram</span>
                <span class="value">nel.micc</span>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Junel. All rights reserved.</p>
    </footer>
</body>
</html>
