<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Junel's Portfolio</title>

    <style>
        /* ====================================
           GLOBAL STYLES
        ==================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ====================================
           NAVIGATION (Unified System)
        ==================================== */
        nav {
            background-color: #000;
            padding: 1.5rem 0;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #4ade80;
        }

        .active-link {
            color: #4ade80;
        }

        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            position: absolute;
            right: 2rem;
        }

        /* ====================================
           CONTACT SECTION
        ==================================== */
        section.contact {
            padding: 6rem 2rem;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        section.contact h2 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        section.contact p.subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 4rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1.5rem;
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.4s ease;
            color: inherit;
        }

        .contact-item:hover {
            border-color: #4ade80;
            transform: translateY(-10px);
            background-color: #111;
            box-shadow: 0 15px 30px rgba(74, 222, 128, 0.1);
        }

        .contact-item img {
            width: 50px;
            height: 50px;
            margin-bottom: 1.5rem;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .contact-item:hover img {
            transform: scale(1.1);
        }

        .label {
            font-size: 0.8rem;
            color: #4ade80;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 1.05rem;
            color: #eee;
            word-break: break-word;
        }

        /* ====================================
           FOOTER
        ==================================== */
        footer {
            padding: 3rem 2rem;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px solid #1a1a1a;
            margin-top: 4rem;
        }

        /* ====================================
           RESPONSIVE
        ==================================== */
        @media (max-width: 768px) {

            .nav-links {
                position: absolute;
                top: 80px;
                right: 0;
                background-color: #000;
                flex-direction: column;
                width: 100%;
                text-align: center;
                padding: 2rem 0;
                gap: 1.5rem;
                display: none;
                border-top: 1px solid #1a1a1a;
            }

            .nav-links.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }

            section.contact h2 {
                font-size: 2.5rem;
            }

            .contact-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 0 auto;
            }
        }

    </style>
</head>

<body>

    <!-- ================= NAVIGATION ================= -->
    <nav>
        <div class="nav-container">

            <div class="hamburger" id="hamburger">☰</div>

            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="case-studies.html">Case Studies</a>
                <a href="testimonials.html">Testimonials</a>
                <a href="recent-work.html">Recent Work</a>
                <a href="contact.html" class="active-link">Contact</a>
                <a href="about-me.html" class="active">About Me</a>  
            </div>

        </div>
    </nav>

    <!-- ================= CONTACT ================= -->
    <section class="contact">
        <h2>Contact</h2>
        <p class="subtitle">Let's work together. Connect with me on any of these platforms.</p>

        <div class="contact-grid">

            <a href="https://www.facebook.com/nel2902" target="_blank" rel="noopener noreferrer" class="contact-item">
                <img src="facebook.png" alt="Facebook">
                <span class="label">Facebook</span>
                <span class="value">Junel Micabalo</span>
            </a>

            <a href="mailto:junelmicabalo19@gmail.com" class="contact-item">
                <img src="gmail.png" alt="Gmail">
                <span class="label">Gmail</span>
                <span class="value">junelmicabalo19@gmail.com</span>
            </a>

            <a href="https://www.instagram.com/nel.micc" target="_blank" rel="noopener noreferrer" class="contact-item">
                <img src="instagram.png" alt="Instagram">
                <span class="label">Instagram</span>
                <span class="value">nel.micc</span>
            </a>

        </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>&copy; 2026 Junel. All rights reserved.</p>
    </footer>

    <!-- ================= MOBILE MENU SCRIPT ================= -->
    <script>
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");

        hamburger.addEventListener("click", () => {
            navLinks.classList.toggle("active");
        });
    </script>

</body>
</html>
