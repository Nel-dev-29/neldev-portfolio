<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Junel's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: #000;
            padding: 1.5rem 0;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #4ade80;
        }

        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .contact-icons img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        /* Footer */
        footer {
            background-color: #000;
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="case-studies.html">Case Studies</a>
            <a href="testimonials.html">Testimonials</a>
            <a href="recent-work.html">Recent Work</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="contact" style="padding: 4rem 2rem; text-align: center;">
        <h2 style="font-size: 3rem; margin-bottom: 2rem;">Contact</h2>
        <p style="color: #ccc;">You can reach me through any of the following:</p>
        <div class="contact-icons">
            <img src="facebook.png" alt="Facebook">
            <img src="gmail.png" alt="Gmail">
            <img src="instagram.png" alt="Instagram">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Junel. All rights reserved.</p>
    </footer>
</body>
</html>
