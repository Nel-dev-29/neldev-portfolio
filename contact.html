<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Junel</title>
    <style>
        /* [Copy the same Navigation CSS] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; line-height: 1.6; }
        nav { background-color: #000; padding: 1.5rem 0; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: 700; color: #4ade80; font-size: 1.5rem; text-decoration: none; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; transition: 0.3s; }
        .nav-links a.active { color: #4ade80; }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .hamburger span { width: 28px; height: 3px; background-color: #fff; }

        .contact-section { padding: 4rem 2rem; max-width: 1000px; margin: 0 auto; text-align: center; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
        .contact-item { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 2rem; border-radius: 1rem; text-decoration: none; color: #fff; transition: 0.3s; }
        .contact-item:hover { border-color: #4ade80; transform: translateY(-5px); }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links { position: fixed; left: -100%; top: 75px; flex-direction: column; background: #000; width: 100%; text-align: center; transition: 0.4s; padding: 2rem 0; }
            .nav-links.active { left: 0; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo-text">JUNEL.</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="case-studies.html">Case Studies</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="recent-work.html">Recent Work</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="contact-section">
        <h2>Get In Touch</h2>
        <div class="contact-grid">
            <a href="mailto:junelmicabalo19@gmail.com" class="contact-item">
                <span style="color:#4ade80; font-weight:700;">EMAIL</span><br>junelmicabalo19@gmail.com
            </a>
            <a href="https://facebook.com/nel2902" class="contact-item">
                <span style="color:#4ade80; font-weight:700;">FACEBOOK</span><br>Junel Micabalo
            </a>
            <a href="https://instagram.com/nel.micc" class="contact-item">
                <span style="color:#4ade80; font-weight:700;">INSTAGRAM</span><br>@nel.micc
            </a>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.onclick = () => navLinks.classList.toggle('active');
    </script>
</body>
</html>
